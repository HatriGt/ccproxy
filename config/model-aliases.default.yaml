# Default Claude model aliases (alias -> upstream model name).
# Seeded into the persistent volume /data/models/aliases.yaml on first start.
# After that, manage entries with `ccproxy add-model` / `ccproxy remove-model`
# (edits the persistent copy live; survives redeploys).
- alias: ak-claude-sonnet-4.6
  name: claude-sonnet-4-6
- alias: ak-claude-sonnet-4.5
  name: claude-sonnet-4-5-20250929
- alias: ak-claude-opus-4.7
  name: claude-opus-4-7
- alias: ak-claude-opus4-7
  name: claude-opus-4-7
- alias: ak-claude-opus-4.8
  name: claude-opus-4-8
- alias: ak-claude-opus4-8
  name: claude-opus-4-8
# Effort variants share the same upstream model; effort is forced via
# payload.override in config.yaml.template (do NOT put (low)/(high) in name).
- alias: ak-claude-opus-4.8-low
  name: claude-opus-4-8
- alias: ak-claude-opus-4.8-medium
  name: claude-opus-4-8
- alias: ak-claude-opus-4.8-high
  name: claude-opus-4-8
- alias: ak-claude-opus-4.6
  name: claude-opus-4-6
- alias: ak-claude-haiku-4.5
  name: claude-haiku-4-5-20251001
# OpenAI / Codex desktop helper IDs → low Claude (override live with
# `ccproxy codex helper-model <alias>`). Needed so gpt-5.4-mini side-calls
# don't 502 on Claude-only OAuth.
- alias: gpt-5.4-mini
  name: claude-haiku-4-5-20251001
- alias: gpt-5.4
  name: claude-haiku-4-5-20251001
- alias: gpt-5.5-mini
  name: claude-haiku-4-5-20251001
- alias: gpt-5-mini
  name: claude-haiku-4-5-20251001
- alias: gpt-4.1-mini
  name: claude-haiku-4-5-20251001
- alias: gpt-4o-mini
  name: claude-haiku-4-5-20251001
- alias: o4-mini
  name: claude-haiku-4-5-20251001
- alias: o3-mini
  name: claude-haiku-4-5-20251001
